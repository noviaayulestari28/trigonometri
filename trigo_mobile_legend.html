  body { overflow: hidden; width: 100vw; height: 100vh; font-family: 'Segoe UI', sans-serif; }
  #root { width: 100vw; height: 100vh; }
  @keyframes zoomIn { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes ropeSwing { 0%,100% { transform: scaleX(1); } 50% { transform: scaleX(1.02); } }
  @keyframes charBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes shakeLeft { 0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)} }
  @keyframes glow { 0%,100%{box-shadow:0 0 10px #22c55e}50%{box-shadow:0 0 25px #22c55e,0 0 40px #22c55e} }
  @keyframes glowRed { 0%,100%{box-shadow:0 0 10px #ef4444}50%{box-shadow:0 0 25px #ef4444,0 0 40px #ef4444} }
  @keyframes confetti { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(120px) rotate(720deg);opacity:0} }
  @keyframes winnerPulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.05)} }
  @keyframes fadeFlash { 0%{opacity:1}50%{opacity:0.3}100%{opacity:1} }
  .zoom-in { animation: zoomIn 1s ease-out forwards; }
  .char-bounce { animation: charBounce 0.6s ease-in-out; }
  .shake-anim { animation: shakeLeft 0.5s ease; }
  .glow-green { animation: glow 1.5s infinite; }
  .glow-red { animation: glowRed 1.5s infinite; }
  .winner-pulse { animation: winnerPulse 0.8s infinite; }
  .fade-flash { animation: fadeFlash 0.5s ease; }
  .btn-answer {
    transition: all 0.15s ease;
    cursor: pointer;
    border: 2px solid transparent;
  }
  .btn-answer:hover:not(:disabled) { transform: scale(1.03); filter: brightness(1.1); }
  .btn-answer:active:not(:disabled) { transform: scale(0.97); }
  .rope-knot {
    transition: left 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .char-left { transition: left 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .char-right { transition: right 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 2px; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function useBGM() {
  const bgmRef = useRef(null);
  const fanfareRef = useRef(null);

  useEffect(() => {
    bgmRef.current = new Audio("https://github.com/ilindekguru/Lagulagu/raw/refs/heads/main/Kids%20Toddler%20Background%20Music%20Song%20For%20Videos%20-%20Background%20Music%20for%20Videos.mp3");
    bgmRef.current.loop = true;
    bgmRef.current.volume = 0.5;
    fanfareRef.current = new Audio("https://github.com/ilindekguru/Lagulagu/raw/refs/heads/main/brass-fanfare-with-timpani-and-winchimes-reverberated-146260.mp3");
    fanfareRef.current.volume = 0.8;
    return () => {
      bgmRef.current?.pause();
      fanfareRef.current?.pause();
    };
  }, []);

  const playBGM = useCallback(() => {
    if (bgmRef.current) {
      bgmRef.current.currentTime = 0;
      bgmRef.current.play().catch(() => {});
    }
  }, []);

  const pauseBGM = useCallback(() => {
    bgmRef.current?.pause();
  }, []);

  const resumeBGM = useCallback(() => {
    bgmRef.current?.play().catch(() => {});
  }, []);

  const playFanfare = useCallback(() => {
    if (fanfareRef.current) {
      fanfareRef.current.currentTime = 0;
      fanfareRef.current.play().catch(() => {});
    }
  }, []);

  return { playBGM, pauseBGM, resumeBGM, playFanfare };
}

  const [shuffledOpts, setShuffledOpts] = useState({ A: [], B: [] });
  const [feedback, setFeedback] = useState({ A: null, B: null });
  const [freeze, setFreeze] = useState({ A: false, B: false });
  const [freezeTimer, setFreezeTimer] = useState({ A: 0, B: 0 });
  const [winner, setWinner] = useState(null);
  const [bouncing, setBouncing] = useState({ A: false, B: false });
  const [shaking, setShaking] = useState({ A: false, B: false });
  const [scoreA, setScoreA] = useState(0);
  const [scoreB, setScoreB] = useState(0);
  const freezeIntervalRef = useRef({});
  const gameStarted = useRef(false);

  const currentQ = allQuestions.current[qIndex % allQuestions.current.length];

  useEffect(() => {
    pauseBGM();
    return () => {};
  }, [pauseBGM]);

  useEffect(() => {
    if (currentQ) {
      setShuffledOpts({
        A: shuffle(currentQ.options),
        B: shuffle(currentQ.options)
      });
      setFeedback({ A: null, B: null });
    }
  }, [qIndex, category]);

  const nextQuestion = useCallback(() => {
    setTimeout(() => {
      setQIndex(p => p + 1);
      setFeedback({ A: null, B: null });
    }, 800);
  }, []);

  const handleAnswer = useCallback((team, answer) => {
    if (freeze[team] || feedback[team] || winner) return;
    const isCorrect = answer === currentQ.correct;
    setFeedback(prev => ({ ...prev, [team]: isCorrect ? 'correct' : 'wrong' }));

    if (isCorrect) {
      setBouncing(prev => ({ ...prev, [team]: true }));
      setTimeout(() => setBouncing(prev => ({ ...prev, [team]: false })), 600);

      const newPos = team === 'A'
        ? Math.max(0, ropePos - 5)
        : Math.min(100, ropePos + 5);
      setRopePos(newPos);
      if (team === 'A') setScoreA(p => p + 1);
      else setScoreB(p => p + 1);

      if (newPos <= 15) {
        setTimeout(() => { setWinner('A'); playFanfare(); }, 400);
      } else if (newPos >= 85) {
        setTimeout(() => { setWinner('B'); playFanfare(); }, 400);
      } else {
        nextQuestion();
      }
    } else {
      setShaking(prev => ({ ...prev, [team]: true }));
      setTimeout(() => setShaking(prev => ({ ...prev, [team]: false })), 500);
      setFreeze(prev => ({ ...prev, [team]: true }));
      let t = 5;
      setFreezeTimer(prev => ({ ...prev, [team]: t }));
      const interval = setInterval(() => {
        t--;
        setFreezeTimer(prev => ({ ...prev, [team]: t }));
        if (t <= 0) {
          clearInterval(interval);
          setFreeze(prev => ({ ...prev, [team]: false }));
          setFeedback(prev => ({ ...prev, [team]: null }));
          setFreezeTimer(prev => ({ ...prev, [team]: 0 }));
        }
      }, 1000);
      freezeIntervalRef.current[team] = interval;
    }
  }, [freeze, feedback, winner, currentQ, ropePos, nextQuestion, playFanfare]);

  const handleBack = () => {
    Object.values(freezeIntervalRef.current).forEach(clearInterval);
    resumeBGM();
    onBack();
  };

  const charLeftPct = Math.max(2, ropePos - 18);
  const charRightPct = Math.max(2, 100 - ropePos - 18);

  if (winner) {
    const winTeam = winner === 'A' ? 'Tim A (Hijau)' : 'Tim B (Merah)';
    const winColor = winner === 'A' ? '#22c55e' : '#ef4444';
    const winImg = winner === 'A'
      ? 'https://i.imgur.com/osPURuq.png'
      : 'https://i.imgur.com/0w50ZIa.png';
    return (
      <div style={{
        width:'100vw', height:'100vh', display:'flex', flexDirection:'column',
        alignItems:'center', justifyContent:'center',
        background:'linear-gradient(135deg,#0f172a,#1e1b4b)',
        position:'relative', overflow:'hidden'
      }}>
        {[...Array(12)].map((_, i) => (
          <div key={i} style={{
            position:'absolute',
            left: `${Math.random()*100}%`,
            top: -20,
            width: 10, height: 20,
            background: ['#f59e0b','#22c55e','#3b82f6','#ec4899','#f97316'][i%5],
            borderRadius: 2,
            animation: `confetti ${1.5 + Math.random()}s ${Math.random()}s ease-out infinite`,
            transform: `rotate(${Math.random()*360}deg)`
          }}/>
        ))}
        <div className="winner-pulse" style={{
          background:'rgba(255,255,255,0.07)',
          borderRadius:30, padding:'50px 60px', textAlign:'center',
          border: `3px solid ${winColor}`,
          boxShadow: `0 0 50px ${winColor}44`
        }}>
          <img src={winImg} alt="Winner" style={{ height:140, marginBottom:20, filter:'drop-shadow(0 0 20px rgba(255,255,255,0.4))' }}/>
          <div style={{ fontSize:50, marginBottom:10 }}>🏆</div>
          <div style={{ fontSize:18, color:'#94a3b8', marginBottom:6 }}>Pemenang</div>
          <div style={{ fontSize:36, fontWeight:900, color:winColor, marginBottom:20 }}>{winTeam}</div>
          <div style={{ display:'flex', gap:16, justifyContent:'center', marginBottom:30 }}>
            <div style={{ background:'rgba(34,197,94,0.2)', borderRadius:12, padding:'10px 20px' }}>
              <div style={{ fontSize:11, color:'#94a3b8' }}>Skor Tim A</div>
              <div style={{ fontSize:24, fontWeight:900, color:'#22c55e' }}>{scoreA}</div>
            </div>
            <div style={{ background:'rgba(239,68,68,0.2)', borderRadius:12, padding:'10px 20px' }}>
              <div style={{ fontSize:11, color:'#94a3b8' }}>Skor Tim B</div>
              <div style={{ fontSize:24, fontWeight:900, color:'#ef4444' }}>{scoreB}</div>
            </div>
          </div>
          <button
            onClick={handleBack}
            style={{
              padding:'14px 40px', fontSize:16, fontWeight:800,
              background:'linear-gradient(135deg,#22c55e,#16a34a)',
              color:'#fff', border:'none', borderRadius:50, cursor:'pointer',
              letterSpacing:2, boxShadow:'0 4px 20px rgba(34,197,94,0.5)'
            }}
          >
            🏠 KEMBALI KE MENU
          </button>
        </div>
      </div>
    );
  }

  const TeamPanel = ({ team, color, borderColor, glowClass }) => {
    const opts = shuffledOpts[team] || [];
    const isFreeze = freeze[team];
    const fb = feedback[team];
    const timer = freezeTimer[team];
    const isBouncing = bouncing[team];
    const isShaking = shaking[team];
    const letters = ['A', 'B', 'C', 'D'];

    return (
      <div style={{
        flex:1, padding:'8px 10px', display:'flex', flexDirection:'column', gap:6,
        background: `linear-gradient(180deg, rgba(0,0,0,0.5), rgba(0,0,0,0.3))`,
        borderTop: `3px solid ${borderColor}`
      }}>
        <div style={{ textAlign:'center', fontSize:12, fontWeight:800, color: borderColor, letterSpacing:2, marginBottom:2 }}>
          {team === 'A' ? '🟢 TIM A' : '🔴 TIM B'}
          {isFreeze && (
            <span style={{ marginLeft:8, color:'#fbbf24', fontSize:11 }}>
              ⏱ {timer}s
            </span>
          )}
          {fb === 'correct' && <span style={{ marginLeft:8, color:'#4ade80', fontSize:11 }}>✓ BENAR!</span>}
          {fb === 'wrong' && !isFreeze && <span style={{ marginLeft:8, color:'#f87171', fontSize:11 }}>✗ SALAH!</span>}
          {isFreeze && <span style={{ marginLeft:4, color:'#fbbf24', fontSize:11 }}>KUNCI!</span>}
        </div>
        {opts.map((opt, i) => {
          let bg = 'rgba(255,255,255,0.1)';
          let bdr = 'rgba(255,255,255,0.2)';
          let txtColor = '#fff';
          if (fb === 'correct' && opt === currentQ.correct) { bg='rgba(34,197,94,0.35)'; bdr='#22c55e'; }
          if (fb === 'wrong' && opt === currentQ.options.find(o => o !== currentQ.correct && shuffledOpts[team].indexOf(o) === i)) {
            if (shuffledOpts[team][i] !== currentQ.correct) { bg='rgba(239,68,68,0.25)'; bdr='#ef4444'; }
          }
          if (isFreeze) { bg='rgba(100,100,100,0.2)'; txtColor='#666'; }

          return (
            <button
              key={i}
              className={`btn-answer ${isShaking ? 'shake-anim' : ''}`}
              disabled={isFreeze || !!fb}
              onClick={() => handleAnswer(team, opt)}
              style={{
                padding:'8px 10px', borderRadius:10, fontSize:12, fontWeight:700,
                background:bg, border:`2px solid ${bdr}`, color:txtColor,
                cursor: isFreeze || fb ? 'not-allowed' : 'pointer',
                textAlign:'left', display:'flex', alignItems:'center', gap:8,
                flex:1, minHeight:0
              }}
            >
              <span style={{
                width:22, height:22, borderRadius:'50%', background:'rgba(255,255,255,0.15)',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:11, fontWeight:900, flexShrink:0, color: isFreeze ? '#555' : borderColor
              }}>{letters[i]}</span>
              <span style={{ lineHeight:1.3 }}>{opt}</span>
            </button>
          );
        })}
      </div>
    );
  };

  const ropeKnotLeft = `calc(${ropePos}% - 12px)`;

  return (
    <div style={{ width:'100vw', height:'100vh', display:'flex', flexDirection:'column', background:'#0f172a', overflow:'hidden' }}>
      {/* TOP: Question panels */}
      <div style={{ height:'16%', display:'flex', minHeight:0 }}>
        {/* Question A */}
        <div style={{
          flex:1, display:'flex', alignItems:'center', justifyContent:'center',
          padding:'6px 12px', background:'linear-gradient(135deg,rgba(22,163,74,0.25),rgba(15,23,42,0.9))',
          borderBottom:'3px solid #22c55e', borderRight:'1px solid rgba(255,255,255,0.1)'
        }}>
          <div style={{ fontSize:12, color:'#fff', textAlign:'center', lineHeight:1.4 }}>
            <span style={{ fontSize:10, color:'#4ade80', display:'block', marginBottom:2 }}>🟢 TIM A — Soal #{qIndex+1}</span>
            <strong>{currentQ?.question}</strong>
          </div>
        </div>
        {/* Score center */}
        <div style={{
          width:80, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
          background:'rgba(0,0,0,0.5)', borderBottom:'3px solid #6366f1'
        }}>
          <div style={{ fontSize:10, color:'#94a3b8', letterSpacing:1 }}>SKOR</div>
          <div style={{ fontSize:18, fontWeight:900, color:'#fff' }}>{scoreA}<span style={{ color:'#6366f1' }}>:</span>{scoreB}</div>
        </div>
        {/* Question B */}
        <div style={{
          flex:1, display:'flex', alignItems:'center', justifyContent:'center',
          padding:'6px 12px', background:'linear-gradient(135deg,rgba(15,23,42,0.9),rgba(185,28,28,0.25))',
          borderBottom:'3px solid #ef4444', borderLeft:'1px solid rgba(255,255,255,0.1)'
        }}>
          <div style={{ fontSize:12, color:'#fff', textAlign:'center', lineHeight:1.4 }}>
            <span style={{ fontSize:10, color:'#f87171', display:'block', marginBottom:2 }}>🔴 TIM B — Soal #{qIndex+1}</span>
            <strong>{currentQ?.question}</strong>
          </div>
        </div>
      </div>

      {/* MIDDLE: Arena */}
      <div style={{
        height:'58%', position:'relative', overflow:'hidden',
        backgroundImage:'url(https://i.imgur.com/KVAWwr3.png)',
        backgroundSize:'cover', backgroundPosition:'center'
      }}>
        <div style={{ position:'absolute', inset:0, background:'rgba(5,10,25,0.45)' }}/>

        {/* Category label */}
        <div style={{
          position:'absolute', top:8, left:'50%', transform:'translateX(-50%)',
          background:'rgba(0,0,0,0.6)', borderRadius:20, padding:'4px 16px',
          fontSize:11, color:'#a5b4fc', letterSpacing:2, zIndex:3,
          border:'1px solid rgba(99,102,241,0.4)'
        }}>
          {info.icon} {category}
        </div>

        {/* Rope */}
        <div style={{
          position:'absolute', top:'50%', left:0, right:0,
          transform:'translateY(-50%)', height:8, zIndex:2
        }}>
          {/* Rope line */}
          <div style={{
            position:'absolute', top:'50%', left:'10%', right:'10%', height:8,
            background:'linear-gradient(90deg, #8B4513, #D2691E, #A0522D, #8B4513)',
            borderRadius:4, transform:'translateY(-50%)',
            boxShadow:'0 2px 8px rgba(0,0,0,0.5)',
            backgroundSize:'20px 100%'
          }}/>
          {/* Rope strands */}
          {[...Array(8)].map((_,i) => (
            <div key={i} style={{
              position:'absolute', top:'50%',
              left:`calc(10% + ${i*10}%)`, width:'10%', height:3,
              background:'rgba(139,69,19,0.5)', transform:'translateY(-50%)'
            }}/>
          ))}
          {/* Center knot */}
          <div
            className="rope-knot"
            style={{
              position:'absolute', top:'50%',
              left: ropeKnotLeft,
              transform:'translateY(-50%)',
              width:24, height:24, borderRadius:'50%',
              background:'radial-gradient(circle at 40% 35%, #f5c842, #d4a01a)',
              border:'3px solid #8B4513',
              boxShadow:'0 0 12px rgba(245,200,66,0.7)',
              zIndex:5
            }}
          />
        </div>

        {/* Character LEFT (Tim A) */}
        <div
          className={`char-left ${bouncing.A ? 'char-bounce' : ''}`}
          style={{
            position:'absolute', bottom:8, zIndex:3,
            left: `${charLeftPct}%`,
            transition:'left 0.4s cubic-bezier(0.34,1.56,0.64,1)'
          }}
        >
          <img
            src="https://i.imgur.com/osPURuq.png"
            alt="Tim A"
            style={{ height:110, filter:'drop-shadow(2px 4px 8px rgba(34,197,94,0.5))' }}
          />
          <div style={{
            textAlign:'center', fontSize:10, fontWeight:800, color:'#4ade80',
            textShadow:'0 0 8px rgba(34,197,94,0.8)', marginTop:2
          }}>TIM A</div>
        </div>

        {/* Character RIGHT (Tim B) */}
        <div
          className={`char-right ${bouncing.B ? 'char-bounce' : ''}`}
          style={{
            position:'absolute', bottom:8, zIndex:3,
            right: `${charRightPct}%`,
            transition:'right 0.4s cubic-bezier(0.34,1.56,0.64,1)'
          }}
        >
          <img
            src="https://i.imgur.com/0w50ZIa.png"
            alt="Tim B"
            style={{ height:110, filter:'drop-shadow(2px 4px 8px rgba(239,68,68,0.5))' }}
          />
          <div style={{
            textAlign:'center', fontSize:10, fontWeight:800, color:'#f87171',
            textShadow:'0 0 8px rgba(239,68,68,0.8)', marginTop:2
          }}>TIM B</div>
        </div>

        {/* Progress bar */}
        <div style={{
          position:'absolute', bottom:0, left:0, right:0, height:6, background:'rgba(0,0,0,0.5)'
        }}>
          <div style={{ position:'absolute', top:0, left:0, width:'15%', height:'100%', background:'#22c55e', opacity:0.6 }}/>
          <div style={{ position:'absolute', top:0, right:0, width:'15%', height:'100%', background:'#ef4444', opacity:0.6 }}/>
          <div style={{
            position:'absolute', top:0, height:'100%',
            left:`${ropePos-2}%`, width:'4%',
            background:'#fbbf24', borderRadius:3,
            boxShadow:'0 0 8px #fbbf24',
            transition:'left 0.4s ease'
          }}/>
        </div>

        {/* Win condition indicators */}
        <div style={{ position:'absolute', top:40, left:10, fontSize:11, color:'#4ade80', background:'rgba(0,0,0,0.5)', padding:'3px 8px', borderRadius:8 }}>
          ◀ Garis Menang A
        </div>
        <div style={{ position:'absolute', top:40, right:10, fontSize:11, color:'#f87171', background:'rgba(0,0,0,0.5)', padding:'3px 8px', borderRadius:8 }}>
          Garis Menang B ▶
        </div>
      </div>

      {/* BOTTOM: Answer buttons */}
      <div style={{ height:'26%', display:'flex', minHeight:0, borderTop:'2px solid rgba(255,255,255,0.1)' }}>
        <TeamPanel team="A" color="green" borderColor="#22c55e" glowClass="glow-green" />
        <div style={{ width:2, background:'rgba(255,255,255,0.1)' }}/>
        <TeamPanel team="B" color="red" borderColor="#ef4444" glowClass="glow-red" />
      </div>

      {/* Back button */}
      <button
        onClick={handleBack}
        style={{
          position:'fixed', top:12, left:12, zIndex:100,
          padding:'6px 14px', fontSize:12, fontWeight:700,
          background:'rgba(0,0,0,0.6)', color:'#fff',
          border:'1px solid rgba(255,255,255,0.2)', borderRadius:20, cursor:'pointer'
        }}
      >
        ← Menu
      </button>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('splash');
  const [selectedCategory, setSelectedCategory] = useState(null);
  const { playBGM, pauseBGM, resumeBGM, playFanfare } = useBGM();
  const isFullscreen = useRef(false);

  const toggleFullscreen = () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
      isFullscreen.current = true;
    } else {
      document.exitFullscreen().catch(() => {});
      isFullscreen.current = false;
    }
  };

  const handleEnterTitle = () => {
    playBGM();
    setScreen('menu');
  };

  const handleSelectCategory = (cat) => {
    setSelectedCategory(cat);
    setScreen('game');
  };

  const handleBackToMenu = () => {
    setScreen('menu');
    resumeBGM();
  };

  return (
    <div style={{ width:'100vw', height:'100vh', position:'relative' }}>
      {screen === 'splash' && <SplashScreen onDone={() => setScreen('title')} />}
      {screen === 'title' && <TitleScreen onEnter={handleEnterTitle} />}
      {screen === 'menu' && <MainMenu onSelect={handleSelectCategory} />}
      {screen === 'game' && selectedCategory && (
        <GameArena
          category={selectedCategory}
          onBack={handleBackToMenu}
          playFanfare={playFanfare}
          pauseBGM={pauseBGM}
          resumeBGM={resumeBGM}
        />
      )}

      {/* Fullscreen button */}
      <button
        onClick={toggleFullscreen}
        style={{
          position:'fixed', top:12, right:12, zIndex:9999,
          width:36, height:36, borderRadius:'50%',
          background:'rgba(0,0,0,0.5)', color:'#fff',
          border:'1px solid rgba(255,255,255,0.3)',
          cursor:'pointer', fontSize:16, display:'flex',
          alignItems:'center', justifyContent:'center',
          backdropFilter:'blur(8px)',
          transition:'all 0.2s ease'
        }}
        title="Toggle Fullscreen"
        onMouseEnter={e => e.currentTarget.style.background='rgba(0,0,0,0.75)'}
        onMouseLeave={e => e.currentTarget.style.background='rgba(0,0,0,0.5)'}
      >
        ⛶
      </button>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
